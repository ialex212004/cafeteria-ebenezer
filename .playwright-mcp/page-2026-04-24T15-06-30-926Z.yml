        - emphasis [ref=e72]: de la fe y las manos
      - paragraph [ref=e73]: "Esta cafetería nació del corazón de un matrimonio cubano que creyó que Dios podía usarlos incluso entre hornos y tazas de café. No fue fácil. Hubo madrugadas de duda, momentos en los que el camino no estaba claro. Pero había una roca firme debajo de cada paso: la convicción de que esto no era solo un negocio, sino un llamado."
      - paragraph [ref=e74]: Cafeteria Ébenezer abrió sus puertas en Valdepeñas no para ser la cafetería más famosa, sino para ser la más fiel. Fiel al producto, fiel a las personas que entran, y sobre todo, fiel a quien nos sostuvo cuando todavía era solo un sueño escrito en un cuaderno.
      - paragraph [ref=e75]: Dios es el centro de todo lo que hacemos aquí. Eso no es un eslogan; es la razón por la que cada detalle importa, por la que cada persona es recibida como un regalo.
